<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://use.fontawesome.com/releases/v5.0.7/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="/content/styles/site.css">
    <link rel="shortcut icon" href="https://img.icons8.com/ios-filled/50/000000/cat-footprint.png" type="image/png">
    <title>Shelter Cat</title>
</head>

<body>
    <header>
        <nav>
            <ul class="navigation">
                <li><a href="/">Home Page</a></li>
                <li><a href="/cats/add-breed">Add Breed</a></li>
                <li><a href="/cats/add-cat">Add Cat</a></li>
            </ul>
        </nav>
        <h1>Cat Shelter</h1>
    </header>

    <main>
        <form action="/cats/shelter/{{catId}}" method="POST" class="shelter-form">
            <h2>Shelter the cat</h2>

            <img src="{{catImage}}" alt="{{catName}}" class="shelter-image">

            <label>Name</label>
            <input type="text" value="{{catName}}" disabled>

            <label>Description</label>
            <textarea disabled>{{catDescription}}</textarea>

            <label>Breed</label>
            <input type="text" value="{{catBreed}}" disabled>

            <button type="submit">Shelter the Cat</button>
        </form>
    </main>
</body>

</html>
