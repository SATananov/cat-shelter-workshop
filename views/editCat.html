<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://use.fontawesome.com/releases/v5.0.7/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="/content/styles/site.css">
    <link rel="shortcut icon" href="https://img.icons8.com/ios-filled/50/000000/cat-footprint.png" type="image/png">
    <title>Edit Cat</title>
</head>

<body>
    <header>
        <nav>
            <ul class="navigation">
                <li><a href="/">Home Page</a></li>
                <li><a href="/cats/add-breed">Add Breed</a></li>
                <li><a href="/cats/add-cat">Add Cat</a></li>
            </ul>
        </nav>
        <h1>Cat Shelter</h1>
    </header>

    <main>
        <form action="/cats/edit/{{catId}}" method="POST" enctype="multipart/form-data">
            <h2>Edit Cat</h2>

            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{catName}}">

            <label for="description">Description</label>
            <textarea id="description" name="description">{{catDescription}}</textarea>

            <label for="upload">Image</label>
            <input type="file" id="upload" name="upload">

            <label for="breed">Breed</label>
            <select id="breed" name="breed">
                {{catBreeds}}
            </select>

            <button type="submit">Edit Cat</button>
        </form>
    </main>
</body>

</html>
